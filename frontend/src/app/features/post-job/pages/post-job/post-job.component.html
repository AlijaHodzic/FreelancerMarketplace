<section class="min-h-screen bg-slate-50 py-16">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="text-center max-w-3xl mx-auto mb-12">
      <h1 class="text-4xl md:text-5xl font-bold text-slate-900 mb-4">Post a Job</h1>
      <p class="text-lg text-slate-500">Tell us about your project and start receiving proposals</p>
    </div>

    <div class="max-w-3xl mx-auto rounded-3xl border border-slate-200 bg-white p-8 md:p-9 shadow-sm">
      <form class="space-y-6" [formGroup]="form" (ngSubmit)="submit()">
        <div *ngIf="successMessage()" class="rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700">
          {{ successMessage() }}
        </div>

        <div *ngIf="errorMessage()" class="rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700">
          {{ errorMessage() }}
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Job Title *</label>
          <input
            type="text"
            formControlName="title"
            placeholder="e.g. Build a modern landing page"
            class="w-full rounded-2xl border border-slate-200 px-4 py-3.5 outline-none focus:border-indigo-500"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Category *</label>
          <select formControlName="category" class="w-full rounded-2xl border border-slate-200 px-4 py-3.5 outline-none focus:border-indigo-500 text-slate-700 bg-white">
            <option>Web Development</option>
            <option>UI/UX Design</option>
            <option>Content Writing</option>
            <option>Marketing</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Job Description *</label>
          <textarea
            rows="6"
            formControlName="description"
            placeholder="Describe your project, requirements, and expectations"
            class="w-full rounded-2xl border border-slate-200 px-4 py-3.5 outline-none focus:border-indigo-500 resize-none"
          ></textarea>
          <p class="mt-2 text-xs text-slate-400">Minimum 30 characters. Be clear and specific about what you need.</p>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-3">Budget Type *</label>
          <div class="grid gap-3 sm:grid-cols-2">
            <label class="rounded-2xl px-4 py-4 cursor-pointer" [ngClass]="form.controls.budgetType.value === 'fixed' ? 'border-2 border-indigo-500 bg-indigo-50/50' : 'border border-slate-200'">
              <div class="flex items-start gap-3">
                <input type="radio" value="fixed" formControlName="budgetType" class="mt-1 accent-indigo-500" />
                <div>
                  <p class="font-semibold text-slate-900">Fixed Price</p>
                  <p class="text-sm text-slate-500">Pay a set amount for the entire project</p>
                </div>
              </div>
            </label>
            <label class="rounded-2xl px-4 py-4 cursor-pointer" [ngClass]="form.controls.budgetType.value === 'hourly' ? 'border-2 border-indigo-500 bg-indigo-50/50' : 'border border-slate-200'">
              <div class="flex items-start gap-3">
                <input type="radio" value="hourly" formControlName="budgetType" class="mt-1 accent-indigo-500" />
                <div>
                  <p class="font-semibold text-slate-900">Hourly Rate</p>
                  <p class="text-sm text-slate-500">Pay based on hours worked</p>
                </div>
              </div>
            </label>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Budget Amount *</label>
          <input type="number" formControlName="budgetAmount" placeholder="5000" class="w-full rounded-2xl border border-slate-200 px-4 py-3.5 outline-none focus:border-indigo-500" />
          <p class="mt-2 text-xs text-slate-400">Enter your total project budget</p>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Deadline *</label>
          <input type="date" formControlName="deadline" class="w-full rounded-2xl border border-slate-200 px-4 py-3.5 outline-none focus:border-indigo-500" />
        </div>

        <div class="pt-5 border-t border-slate-100 flex flex-col sm:flex-row gap-4 sm:items-center sm:justify-between">
          <button
            type="submit"
            [disabled]="loading()"
            class="inline-flex items-center justify-center rounded-xl bg-indigo-500 px-6 py-3.5 text-white font-semibold hover:bg-indigo-600 transition-colors min-w-52 disabled:cursor-not-allowed disabled:bg-indigo-300"
          >
            {{ loading() ? 'Posting...' : 'Post Job' }}
          </button>
          <a routerLink="/marketplace" class="inline-flex items-center justify-center rounded-xl px-4 py-3 text-slate-500 hover:text-slate-700 transition-colors">
            Back to Marketplace
          </a>
        </div>
      </form>
    </div>

    <div class="max-w-3xl mx-auto mt-6 rounded-2xl border border-blue-100 bg-blue-50 px-5 py-5">
      <h2 class="text-sm font-semibold text-indigo-700 mb-3">Tips for posting a successful job:</h2>
      <ul class="space-y-2 text-sm text-slate-600">
        <li *ngFor="let item of checklist">&#8226; {{ item }}</li>
      </ul>
    </div>
  </div>
</section>
