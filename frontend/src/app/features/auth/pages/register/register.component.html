<section class="min-h-screen bg-white py-16 px-4">
  <div class="max-w-md mx-auto">
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-3 mb-6">
        <div class="w-8 h-8 rounded-lg bg-indigo-500 text-white flex items-center justify-center font-bold text-sm">F</div>
        <span class="text-3xl font-semibold text-slate-900">FreelanceHub</span>
      </div>
      <h1 class="text-5xl font-bold tracking-tight text-slate-900 mb-3">Create your account</h1>
      <p class="text-lg text-slate-500">Start hiring or earning today</p>
    </div>

    <div class="rounded-3xl border border-slate-200 bg-white p-6 md:p-7 shadow-sm">
      <form class="space-y-5" [formGroup]="form" (ngSubmit)="submit()">
        <div *ngIf="errorMessage()" class="rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700">
          {{ errorMessage() }}
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-3">I want to:</label>
          <div class="grid grid-cols-2 gap-3">
            <button
              type="button"
              (click)="setRole('Client')"
              [ngClass]="form.controls.role.value === 'Client' ? 'border-2 border-indigo-500 bg-indigo-50' : 'border border-slate-200 bg-white'"
              class="rounded-2xl p-4 text-center transition-colors"
            >
              <div class="font-semibold text-indigo-600">Hire Talent</div>
              <div class="text-xs text-slate-500 mt-1">I'm a client</div>
            </button>
            <button
              type="button"
              (click)="setRole('Freelancer')"
              [ngClass]="form.controls.role.value === 'Freelancer' ? 'border-2 border-indigo-500 bg-indigo-50' : 'border border-slate-200 bg-white'"
              class="rounded-2xl p-4 text-center transition-colors"
            >
              <div class="font-semibold text-slate-700">Find Work</div>
              <div class="text-xs text-slate-500 mt-1">I'm a freelancer</div>
            </button>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Full Name</label>
          <input
            type="text"
            formControlName="fullName"
            placeholder="John Doe"
            class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Email Address</label>
          <input
            type="email"
            formControlName="email"
            placeholder="you@example.com"
            class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Password</label>
          <input
            type="password"
            formControlName="password"
            placeholder="Create a strong password"
            class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500"
          />
          <p class="mt-2 text-xs text-slate-400">Must be at least 8 characters with letters and numbers</p>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Confirm Password</label>
          <input
            type="password"
            formControlName="confirmPassword"
            placeholder="Re-enter your password"
            class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500"
          />
          <p *ngIf="form.hasError('passwordMismatch') && form.controls.confirmPassword.touched" class="mt-2 text-xs text-rose-500">
            Passwords do not match.
          </p>
        </div>

        <label class="flex items-start gap-3 text-sm text-slate-500">
          <input type="checkbox" formControlName="acceptTerms" class="mt-1 accent-indigo-500" />
          <span>
            I agree to the <a routerLink="/register" class="text-indigo-500">Terms of Service</a> and
            <a routerLink="/register" class="text-indigo-500">Privacy Policy</a>
          </span>
        </label>

        <button
          type="submit"
          [disabled]="loading()"
          class="w-full rounded-2xl bg-indigo-500 text-white px-5 py-3.5 font-semibold hover:bg-indigo-600 transition-colors disabled:cursor-not-allowed disabled:bg-indigo-300"
        >
          {{ loading() ? 'Creating account...' : 'Create Account' }}
        </button>

        <div class="flex items-center gap-3 text-sm text-slate-400">
          <div class="h-px bg-slate-200 flex-1"></div>
          <span>Or sign up with</span>
          <div class="h-px bg-slate-200 flex-1"></div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <button type="button" class="rounded-2xl border border-slate-200 px-4 py-3 text-sm font-medium text-slate-700 hover:bg-slate-50">Google</button>
          <button type="button" class="rounded-2xl border border-slate-200 px-4 py-3 text-sm font-medium text-slate-700 hover:bg-slate-50">Facebook</button>
        </div>
      </form>
    </div>

    <p class="text-center text-sm text-slate-500 mt-6">
      Already have an account?
      <a routerLink="/login" class="text-indigo-500 font-medium hover:text-indigo-600">Sign in</a>
    </p>
  </div>
</section>
