<header class="bg-white border-b border-slate-200 sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      <a
        routerLink="/"
        class="flex items-center space-x-2 hover:opacity-80 transition-opacity shrink-0"
        aria-label="FreelanceHub home"
      >
        <div class="w-8 h-8 bg-indigo-500 rounded-lg flex items-center justify-center shadow-sm">
          <span class="text-white font-bold text-sm">F</span>
        </div>
        <span class="font-semibold text-xl text-slate-900">FreelanceHub</span>
      </a>

      <nav class="hidden lg:flex items-center space-x-7 ml-10">
        <a
          *ngFor="let link of navLinks()"
          [routerLink]="link.path"
          routerLinkActive="text-blue-600"
          [routerLinkActiveOptions]="{ exact: link.path === '/' }"
          class="text-sm font-medium text-slate-500 hover:text-slate-900 transition-colors"
        >
          {{ link.label }}
        </a>
      </nav>

      <div class="ml-auto flex items-center space-x-2 sm:space-x-3">
        <ng-container *ngIf="isAuthenticated(); else guestActions">
          <div class="hidden md:flex items-center rounded-full border border-slate-200 bg-slate-50 px-3 py-2">
            <div class="mr-3 h-9 w-9 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center text-sm font-semibold">
              {{ user()?.fullName?.charAt(0) }}
            </div>
            <div class="pr-1">
              <p class="text-sm font-semibold text-slate-900 leading-none">{{ user()?.fullName }}</p>
              <p class="text-xs text-slate-500 mt-1">{{ role() }}</p>
            </div>
          </div>

          <a
            *ngIf="primaryAction() as action"
            [routerLink]="action.path"
            class="hidden sm:inline-flex items-center justify-center px-3 sm:px-4 py-2 bg-indigo-500 text-white text-xs sm:text-sm font-medium rounded-xl hover:bg-indigo-600 transition-colors shadow-sm whitespace-nowrap"
          >
            {{ action.label }}
          </a>

          <button
            type="button"
            (click)="logout()"
            class="inline-flex items-center justify-center px-3 sm:px-4 py-2 rounded-xl border border-slate-200 text-xs sm:text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors whitespace-nowrap"
          >
            Logout
          </button>
        </ng-container>

        <ng-template #guestActions>
          <a
            routerLink="/login"
            class="inline-flex items-center justify-center px-3 sm:px-4 py-2 rounded-xl border border-slate-200 text-xs sm:text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors whitespace-nowrap"
          >
            Sign In
          </a>

          <a
            routerLink="/register"
            class="inline-flex items-center justify-center px-3 sm:px-4 py-2 bg-indigo-500 text-white text-xs sm:text-sm font-medium rounded-xl hover:bg-indigo-600 transition-colors shadow-sm whitespace-nowrap"
          >
            Get Started
          </a>
        </ng-template>
      </div>

      <button
        (click)="toggleMobileMenu()"
        type="button"
        class="lg:hidden ml-2 p-2 text-slate-600 hover:text-slate-900 shrink-0"
        aria-label="Toggle menu"
      >
        <ng-container *ngIf="mobileMenuOpen(); else menuIcon">
          <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M18 6 6 18M6 6l12 12"></path>
          </svg>
        </ng-container>

        <ng-template #menuIcon>
          <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path>
          </svg>
        </ng-template>
      </button>
    </div>

    <div *ngIf="mobileMenuOpen()" class="lg:hidden py-4 border-t border-slate-200">
      <div *ngIf="isAuthenticated()" class="mb-4 rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3">
        <p class="text-sm font-semibold text-slate-900">{{ user()?.fullName }}</p>
        <p class="text-xs text-slate-500 mt-1">{{ role() }}</p>
      </div>

      <nav class="flex flex-col space-y-3">
        <a
          *ngFor="let link of navLinks()"
          [routerLink]="link.path"
          routerLinkActive="text-blue-600 bg-blue-50"
          [routerLinkActiveOptions]="{ exact: link.path === '/' }"
          (click)="closeMobileMenu()"
          class="text-left px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50 transition-colors rounded-lg"
        >
          {{ link.label }}
        </a>

        <a
          *ngIf="isAuthenticated() && primaryAction() as action"
          [routerLink]="action.path"
          (click)="closeMobileMenu()"
          class="text-left px-4 py-2 text-sm font-medium text-white bg-indigo-500 hover:bg-indigo-600 transition-colors rounded-lg"
        >
          {{ action.label }}
        </a>

        <a
          *ngIf="!isAuthenticated()"
          routerLink="/login"
          (click)="closeMobileMenu()"
          class="text-left px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50 transition-colors rounded-lg"
        >
          Sign In
        </a>

        <a
          *ngIf="!isAuthenticated()"
          routerLink="/register"
          (click)="closeMobileMenu()"
          class="text-left px-4 py-2 text-sm font-medium text-white bg-indigo-500 hover:bg-indigo-600 transition-colors rounded-lg"
        >
          Get Started
        </a>

        <button
          *ngIf="isAuthenticated()"
          type="button"
          (click)="logout()"
          class="text-left px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50 transition-colors rounded-lg"
        >
          Logout
        </button>
      </nav>
    </div>
  </div>
</header>
