<button
  type="button"
  class="bg-white rounded-xl p-6 border border-gray-200 hover:border-blue-300 hover:shadow-md transition-all group w-full"
>
  <div class="flex flex-col items-center text-center space-y-3">
    <div class="w-12 h-12 bg-blue-50 rounded-lg flex items-center justify-center group-hover:bg-blue-100 transition-colors">
      <!-- ICONS -->
      <ng-container [ngSwitch]="icon">
        <!-- Code -->
        <svg *ngSwitchCase="'Code'" class="w-6 h-6 text-blue-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 18l6-6-6-6"></path>
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 6l-6 6 6 6"></path>
        </svg>

        <!-- Smartphone -->
        <svg *ngSwitchCase="'Smartphone'" class="w-6 h-6 text-blue-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="7" y="2" width="10" height="20" rx="2" ry="2"></rect>
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 18h.01"></path>
        </svg>

        <!-- Palette -->
        <svg *ngSwitchCase="'Palette'" class="w-6 h-6 text-blue-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 22a10 10 0 1 0-10-10c0 3.5 2.5 4 4 4h1a2 2 0 0 1 2 2c0 1.1.9 2 2 2h1z"></path>
          <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 10.5h.01M10.5 7.5h.01M13.5 7.5h.01M16.5 10.5h.01"></path>
        </svg>

        <!-- Paintbrush -->
        <svg *ngSwitchCase="'Paintbrush'" class="w-6 h-6 text-blue-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M18 2l4 4-10 10H8V12L18 2z"></path>
          <path stroke-linecap="round" stroke-linejoin="round" d="M2 22c3 0 6-2 6-5v-1H5a3 3 0 0 0-3 3v3z"></path>
        </svg>

        <!-- FileText -->
        <svg *ngSwitchCase="'FileText'" class="w-6 h-6 text-blue-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <path stroke-linecap="round" stroke-linejoin="round" d="M14 2v6h6"></path>
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 13H8M16 17H8M10 9H8"></path>
        </svg>

        <!-- TrendingUp -->
        <svg *ngSwitchCase="'TrendingUp'" class="w-6 h-6 text-blue-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M23 6l-9.5 9.5-5-5L1 18"></path>
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 6h6v6"></path>
        </svg>

        <!-- Video -->
        <svg *ngSwitchCase="'Video'" class="w-6 h-6 text-blue-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="7" width="14" height="10" rx="2" ry="2"></rect>
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 10l6-3v10l-6-3z"></path>
        </svg>

        <!-- Database -->
        <svg *ngSwitchCase="'Database'" class="w-6 h-6 text-blue-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 5v6c0 1.7 4 3 9 3s9-1.3 9-3V5"></path>
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 11v6c0 1.7 4 3 9 3s9-1.3 9-3v-6"></path>
        </svg>

        <!-- Fallback -->
        <svg *ngSwitchDefault class="w-6 h-6 text-blue-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 18l6-6-6-6"></path>
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 6l-6 6 6 6"></path>
        </svg>
      </ng-container>
    </div>

    <div>
      <h3 class="font-semibold text-gray-900">{{ category.name }}</h3>
      <p class="text-sm text-gray-500 mt-1">{{ formatCount(category.count) }} freelancers</p>
    </div>
  </div>
</button>
